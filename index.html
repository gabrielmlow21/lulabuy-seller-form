<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lulabuy - Seller Centre</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>
</head>
<body>
    <div class="container">
        <h1 class="heading-primary">Seller Centre</h1>
        <h2 class="heading-secondary">Seller Registration</h2>
        <div class="progress-bar">
            <div class="progress-bar__element">
                <img src="img/nut.png" alt="a picture of an acorn nut">
                <p>Business Information</p>
            </div>
            <div class="progress-bar__element">
                <img src="img/nut.png" alt="a picture of an acorn nut">
                <p>Shop Information</p>
            </div>
            <div class="progress-bar__element">
                <img src="img/nut.png" alt="a picture of an acorn nut">
                <p>Submit</p>
            </div>
        </div>
    </div>
</body>
</html>
