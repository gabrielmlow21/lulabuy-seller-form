<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lulabuy - Seller Centre</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1 class="heading-primary">Seller Centre</h1>
        <h2 class="heading-secondary">Seller Registration</h2>
        <div class="progress-bar">
            <div class="progress-bar__element">
                <img src="img/nut.png" alt="a picture of an acorn nut">
                <p>Business Information</p>
            </div>
            <div class="progress-bar__element">
                <img src="img/nut.png" alt="a picture of an acorn nut">
                <p>Shop Information</p>
            </div>
            <div class="progress-bar__element">
                <img src="img/nut.png" alt="a picture of an acorn nut">
                <p>Submit</p>
            </div>
        </div>
        <hr>
        <form>
            <div class="form__step form__step-1 active">
                <label for="company-name">Company Name</label>
                <input type="text" id="company-name" name="company-name">
                <label for="business-registration">Business Registration No.</label>
                <input type="text" id="business-registration" name="business-registration">
                <button class="button button-next">Next</button>
            </div>
            <div class="form__step form__step-2">
                <label for="shop-name">Shop Name</label>
                <input type="text" id="shop-name" name="shop-name">
                <label for="pickup-address">Pickup Address</label>
                <input type="text" id="pickup-address" name="pickup-address">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email">
                <fieldset>
                    <legend>Phone No.</legend>
                    <label for="number-office">Office</label>
                    <input type="tel" id="number-office" name="number-office">
                    <label for="number-mobile">Mobile</label>
                    <input type="tel" id="number-mobile" name="number-mobile">
                </fieldset>
                <label for="password">Password</label>
                <input type="password" id="password" name="password">
                <label for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password" name="confirm-password">
                <button class="button button-submit">Submit</button>
            </div>
            <div class="form__step form__step-3">
                <!-- credits to Istiak Tridip -->
                <div class="success-checkmark">
                    <div class="check-icon">
                        <span class="icon-line line-tip"></span>
                        <span class="icon-line line-long"></span>
                        <div class="icon-circle"></div>
                        <div class="icon-fix"></div>
                    </div>
                </div>
                <p class="success-message">Your details has been successfully submitted</p>
                <button class="button button-login">Log In</button>
            </div>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
